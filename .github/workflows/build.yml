name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pymupdf pillow pyinstaller

      - name: Build .exe
        run: pyinstaller --onefile --windowed --name StampPDF --collect-all tkinter main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StampPDF-windows
          path: dist/StampPDF.exe
          retention-days: 30
